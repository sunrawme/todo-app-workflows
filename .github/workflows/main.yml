name: Test and Build 
on: 
   push:
      branches:
        - main 
        pull_request:
          branches:
            - main
jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Checkout Code

        - name: Use Node.js
          uses: actions/setup-node@4
          with:
          node-version: 22

        - name: Install Dependencies 
          run: npm ci 

        - name: Run List
          run: npm run lint

        - name: Run Type Check 
          run: npm run type-check
        
        - name: Run Tests
          run: npm run test
          

